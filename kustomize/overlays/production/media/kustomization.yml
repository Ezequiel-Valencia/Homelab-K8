# create kustimization.yaml file
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Merge Patch https://stackoverflow.com/questions/76004172/how-to-add-init-container-with-kustomize

namespace: media

patches:
  - target:
      kind: Deployment
      namespace: media
      labelSelector: "app-type=arr"
    patch: |
      - op: add
        path: /spec/template/spec/nodeName
        value: media
  - target:
      kind: Deployment
      namespace: media
      name: kavita
    patch: |
      - op: add
        path: /spec/template/spec/nodeName
        value: media
  - target:
      kind: Deployment
      namespace: media
      name: jellyfin
    patch: |
      - op: add
        path: /spec/template/spec/nodeName
        value: zpclonghorn

resources:
- ../../../base/media
- ../../../config/production/media
- storage.yml
