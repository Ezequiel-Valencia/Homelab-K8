---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ittool-route
  namespace: tools
spec:
  hosts:
  - ittool.homelab.ezequielvalencia.com
  gateways:
  - istio-system/homelab-gateway 
  http:
  - route:
    - destination:
        host: ittool.tools.svc.cluster.local
        port:
          number: 80
