apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tools

resources:
- namespace.yml
- it-tools.yml
- karakeep.yml
- gitea.yml
- open-project.yml
- leantime.yml

patches:
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/hostUsers
        value: false

replicas:
  - name: gitea
    count: 1
  - name: ittool
    count: 1
  - name: karakeep
    count: 1
  - name: openproject
    count: 0
  - name: leantime
    count: 1
